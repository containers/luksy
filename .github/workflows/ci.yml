name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  vendor:
    name: Verify vendor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: make vendor && git diff --exit-code

  test-unit:
    name: Unit tests (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, 386]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: GOARCH=${{ matrix.goarch }} go test -timeout 45m -v -cover

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y bats cryptsetup
      - name: Build binary
        run: make
      - name: Defaults tests
        run: sudo -E bats -f defaults ./tests
      - name: AES tests
        run: sudo -E bats -f aes ./tests
